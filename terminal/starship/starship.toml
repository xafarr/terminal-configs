# Shows the username
[username]
style_user = "blue bold"
style_root = "black bold"
format = " [$user]($style)"
disabled = true  # disable in powershell
show_always = false

[directory]
truncation_length = 4
truncation_symbol = "ŌĆ”/"
truncate_to_repo = false
style = "blue"
repo_root_style =  "blue bold"
read_only_style = "197"
read_only = " ­¤öÆ"
format = " [$path]($style)[$read_only]($read_only_style)"
repo_root_format = " [$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = "\uF126"
format = " [$symbol $branch]($style)"
style = "green"

[git_commit]
tag_disabled = false

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "green"
untracked = " [?${count}](blue)"
ahead = " ŌćĪ${count}"
diverged = " ŌćĪ${ahead_count} ŌćŻ${behind_count}"
behind = " ŌćŻ${count}"
stashed = " ¾░ÅŚ ${count}"
modified = " [!${count}](yellow)"
staged = " [+${count}](yellow)"
renamed = " [┬╗${count}](blue)"
deleted = " [Ō£Ś${count}](red)"

# Configure the SSH prompt
[hostname]
ssh_only = true
format = "[ $ssh_symbol$hostname]($style)"

# Configure the background jobs
[jobs]
number_threshold = 1
symbol_threshold = 1
format = "[ ’ÉŻ $number]($style)"

[shell]
disabled = false
format = "[ Ņ»Ŗ $indicator]($style)"
style = "bold 244"
bash_indicator = "bash"
zsh_indicator = "zsh"
fish_indicator = "fish"
powershell_indicator = "pwsh"
cmd_indicator = "cmd"
tcsh_indicator = "tcsh"
elvish_indicator = "elsh"
xonsh_indicator = "xsh"
nu_indicator = "nush"
ion_indicator = "ionsh"

# Configure the package version
[package]
format = "[ Ņ¼® $version]($style)"
style = "bold white"
disabled = true

# Configure the Node.js module
[nodejs]
format = "[ ¾░ÄÖ $version]($style)"
style = "bold green"

# Configure the golang module
[golang]
format = "[ Ņś¦ $version]($style)"

# Configure the .NET module
[dotnet]
format = "[ ŅØ┐ $version]($style)"
style = "bold blue"
  
# Configure the Rust module
[rust]
format = "[ ŅÜŗ $version]($style)"
style = "bold red"

# Configure the Java module
[java]
format = "[ Ņē¢ $version]($style)"
style = "bold purple"

[aws]
disabled = true

[terraform]
disabled = false
format = "[ ¾▒üó $version]($style)"

[vagrant]
format = "[ V vagrant $version]($style)"

[docker_context]
format = "[ ’īł $context](blue bold)"

[helm]
format = "[ ’łÜ $version](bold purple)"

[python]
format = "[ ¾░īĀ $version ($virtualenv)]($style)"

[ruby]
format = "[ ŅłŠ $version]($style)"

[kubernetes]
format = "[ ¾▒āŠ $context](bold purple)"
disabled = true

[cmd_duration]
min_time = 10_000
style = "244"
format = "[ ’ēō $duration]($style)"

[kotlin]
style = "bold blue"
format = "[ ¾▒łÖ $version]($style)"

[custom.git_host]
command = """ source $XDG_CONFIG_HOME/commonrc/shell_functions && get_git_host_icon """
require_repo = true
when = "git rev-parse --is-inside-work-tree"
style = "green"
format = " [$output]($style)"

