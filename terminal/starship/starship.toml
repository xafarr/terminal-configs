HardenedBSD = "¾░×ī "
Illumos = "¾░łĖ "
Linux = "’īÜ "
Mabox = "Ņ¼® "
Macos = "’īé "
Manjaro = "’īÆ "
Mariner = "’ćŹ "
MidnightBSD = "’åå "
Mint = "’īÄ "
NetBSD = "’Ćż "
NixOS = "’īō "
OpenBSD = "¾░ł║ "
openSUSE = "’īö "
