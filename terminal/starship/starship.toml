# ~/.config/starship.toml

palette = "catppuccin_latte"

# Inserts a blank line between shell prompts
add_newline = true

# Custom command timeout
command_timeout = 5000

# Change the default prompt format
format = """\
$os\
$battery\
$directory\
${custom.git_host}\
$git_branch\
$git_commit\
$git_status\
$git_state $fill\
$ansible\
$java\
$kotlin\
$dotnet\
$python\
$nodejs\
$rust\
$golang\
$ruby\
$hostname\
$jobs\
$shell\
$cmd_duration
$character"""

# Fill ┬Ę in first row between left and right prompt
[fill]
symbol = "┬Ę"
style = "dimmed 244"

[battery]
format = " [$symbol$percentage]($style)"
full_symbol = "­¤öŗ"
charging_symbol = "¾░éä"
discharging_symbol = "­¤ÆĆ"
empty_symbol = "¾░ü║"

[git_state]
format = " [$state($progress_current$progress_total)]($style)"

# Change the default prompt characters
[character]
success_symbol = " [’äĀ ](bold green)"
error_symbol = " [’äĀ ](bold red)"
vimcmd_symbol = " [Ņ¤ģ ](bold green)"
vimcmd_replace_symbol = " [Ņ¤ģ ](bold purple)"
vimcmd_replace_one_symbol = " [Ņ¤ģ ](bold purple)"
vimcmd_visual_symbol = " [Ņ¤ģ ](bold yellow)"

# No need for env variables as starship provides a way to show your current distro
[os]
format =" [$symbol](bold white)"
disabled = false

[os.symbols]
Alpaquita = "Ņ¬ó "
Alpine = "’īĆ "
Amazon = "’ē░ "
